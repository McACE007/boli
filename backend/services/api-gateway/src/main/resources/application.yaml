spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: '*'
            allowedMethods: '*'
            allowedHeaders: '*'
      routes:
        # Auth endpoints (login, register)
        - id: auth-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/auth/**

        # Current user profile
        - id: user-me
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/me

        # User Service
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        # Auction Service
        - id: auction-service
          uri: lb://AUCTION-SERVICE
          predicates:
            - Path=/api/auctions/**

        # Bidding Service
        - id: bidding-service
          uri: lb://BIDDING-SERVICE
          predicates:
            - Path=/api/bids/**

        # Node.js Notification Service (not in Eureka, hardcoded)
        - id: notification-service
          uri: http://localhost:8093
          predicates:
            - Path=/api/notifications/**
  main:
    web-application-type: reactive

server:
  port: 8084

jwt:
  secret: jJUyXRlAHh7caMCgmpLrwglZ3BH8APgjdmee6B18fN1
  expiration: 31536000000
